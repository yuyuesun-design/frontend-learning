<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的练习网页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>我的第一个网页</h1>
<p>这是一个段落。</p>    
<button id="helloButton">点我一下</button>
<p id="message"></p>
</header>
<main>
        <section class="card" id="aboutCard">
          <h2>关于我</h2>
          <p>这是一个卡片区域，用来展示一组相关内容。</p>
        </section>
<h2>这是一个副标题</h2>
<a href="https://www.baidu.com" target="_blank">打开百度</a>
<br>
<img src="https://picsum.photos/200/120" alt="随机图片">
<h2>我的兴趣</h2>
<ul>
  <li>学习前端</li>
  <li>设计网页</li>
  <li>做小项目</li>
</ul>
<h2>学习步骤</h2>
<ol>
  <li>先学 HTML</li>
  <li>再学 CSS</li>
  <li>最后学 JavaScript</li>
</ol>
<h2>学习计划表</h2>

<table>
  <tr>
    <th>学习内容</th>
    <th>目标</th>
    <th>状态</th>
  </tr>
  <tr>
    <td>HTML</td>
    <td>认识网页结构</td>
    <td>学习中</td>
  </tr>
  <tr>
    <td>CSS</td>
    <td>美化网页</td>
    <td>未开始</td>
  </tr>
</table>
<h2>联系我</h2>

<form>
  <label>你的名字：</label>
  <input type="text" placeholder="请输入名字">

  <br><br>

  <label>你的邮箱：</label>
  <input type="email" placeholder="请输入邮箱">

  <br><br>

  <label>你想学习什么：</label>
  <select>
    <option>HTML</option>
    <option>CSS</option>
    <option>JavaScript</option>
  </select>

  <br><br>

  <label>留言：</label>
  <textarea placeholder="写下你的想法"></textarea>

  <br><br>

  <button type="submit">提交</button>
</form>
</main>
 <footer>
<p>© 2026 我的练习网页</p>
</footer>
<script src="script.js"></script>
</body>
</html>
